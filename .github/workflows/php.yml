name: php

on:
  push:
    branches: [main]
    paths: ["php/**", "spec/**", ".github/workflows/php.yml"]
  pull_request:
    paths: ["php/**", "spec/**", ".github/workflows/php.yml"]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: php
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: sodium
      - run: composer install --prefer-dist --no-progress
      - run: composer test
