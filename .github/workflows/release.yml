name: release

on:
  push:
    tags:
      - "dotnet/v*"
      - "node/v*"
      - "edge/v*"
      - "python/v*"

jobs:
  dotnet:
    if: startsWith(github.ref, 'refs/tags/dotnet/v')
    runs-on: ubuntu-latest
    env:
      REF: ${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Resolve version from tag
        run: echo "VERSION=${REF#refs/tags/dotnet/v}" >> "$GITHUB_ENV"
      - run: dotnet test dotnet --nologo
      - run: dotnet pack dotnet/src/ArgonGuard.Passwords -c Release -p:Version="$VERSION" -o out
      - name: Publish to NuGet (needs NUGET_API_KEY secret; works without prefix reservation)
        if: vars.PUBLISH_ENABLED == 'true'
        run: dotnet nuget push "out/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      - uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: out/*.nupkg

  node:
    if: startsWith(github.ref, 'refs/tags/node/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    defaults:
      run:
        working-directory: node
    env:
      REF: ${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # @argonguard/core 不發佈，但 runtime bundle（tsup noExternal）與 .d.ts rollup
      # （api-extractor bundledPackages）都需要先產出 core/dist，故必須先 build core。
      - name: Build @argonguard/core (unpublished workspace dep)
        working-directory: core
        run: npm ci && npm run build
      - run: npm ci
      - run: npm run typecheck && npm test
      - run: npm run build
      - name: Set version from tag
        run: npm version "${REF#refs/tags/node/v}" --no-git-tag-version --allow-same-version
      - name: Publish to npm (provenance; needs NPM_TOKEN or trusted publisher)
        if: vars.PUBLISH_ENABLED == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm pack
      - uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: node/*.tgz

  edge:
    if: startsWith(github.ref, 'refs/tags/edge/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    defaults:
      run:
        working-directory: edge
    env:
      REF: ${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Build @argonguard/core (unpublished workspace dep)
        working-directory: core
        run: npm ci && npm run build
      - run: npm ci
      - run: npm run typecheck && npm test
      - run: npm run build
      - name: Set version from tag
        run: npm version "${REF#refs/tags/edge/v}" --no-git-tag-version --allow-same-version
      - name: Publish to npm (provenance; needs NPM_TOKEN or trusted publisher)
        if: vars.PUBLISH_ENABLED == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm pack
      - uses: actions/upload-artifact@v7
        with:
          name: npm-package-edge
          path: edge/*.tgz

  python:
    if: startsWith(github.ref, 'refs/tags/python/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # PyPI trusted publishing (OIDC)
    env:
      REF: ${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set version from tag
        run: |
          VERSION="${REF#refs/tags/python/v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" python/pyproject.toml
      - run: pip install build && python -m build python
      - name: Publish to PyPI (trusted publishing; set publisher on PyPI first)
        if: vars.PUBLISH_ENABLED == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
      - uses: actions/upload-artifact@v7
        with:
          name: pypi-package
          path: python/dist/*
