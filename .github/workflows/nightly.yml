name: nightly

on:
  schedule:
    - cron: "0 20 * * *" # 04:00 台北
  workflow_dispatch:

jobs:
  isopoh-backup-conformance:
    # M4-T2：備援引擎 Isopoh 對凍結 deterministic 向量 raw tag 重算——備援隨時可用
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet test dotnet/backup-engine-tests/Isopoh.Conformance.Tests --nologo

  php-sodium-only-conformance:
    # M4-T2：PHP sodium fallback provider 全套 conformance（ARGONGUARD_TEST_FORCE_PROVIDER 僅允許切 sodium）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: php
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: sodium
      - run: composer install --prefer-dist --no-progress
      - run: composer test
        env:
          ARGONGUARD_TEST_FORCE_PROVIDER: sodium
